<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <style>

        /* ================= RESET ================= */

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        /* ================= BODY ================= */

        body{

            background:#f4f4f4;

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            flex-direction:column;
        }

        /* ================= LOGO ================= */

        .logo{

            position:absolute;

            top:40px;

            left:60px;
        }

        .logo h2{

            font-size:34px;

            color:#111;
        }

        .logo span{

            font-weight:bold;
        }

        /* ================= CONTAINER ================= */

        .login-container{

            width:520px;

            background:white;

            padding:60px;

            border-radius:10px;

            box-shadow:0px 4px 12px rgba(0,0,0,0.08);
        }

        /* ================= TITLE ================= */

        .login-container h1{

            text-align:center;

            font-size:65px;

            font-weight:300;

            margin-bottom:10px;
        }

        .sub-title{

            text-align:center;

            margin-bottom:50px;

            color:#555;
        }

        /* ================= INPUT ================= */

        .input-group{

            margin-bottom:35px;
        }

        .input-group input{

            width:100%;

            border:none;

            border-bottom:2px solid #ccc;

            padding:14px 5px;

            font-size:20px;

            background:none;

            outline:none;
        }

        /* ================= BUTTON ================= */

        .login-btn{

            width:100%;

            background:#1976d2;

            color:white;

            border:none;

            padding:16px;

            border-radius:6px;

            font-size:22px;

            cursor:pointer;

            margin-top:20px;

            transition:0.3s;
        }

        .login-btn:hover{

            background:#1565c0;
        }

        /* ================= REMEMBER ================= */

        .remember-box{

            display:flex;

            align-items:center;

            gap:10px;

            margin-top:25px;

            font-size:18px;
        }

        /* ================= SIGNUP LINK ================= */

        .signup-link{

            text-align:center;

            margin-top:45px;

            font-size:18px;
        }

        .signup-link a{

            color:#1976d2;

            text-decoration:none;

            font-weight:bold;
        }

    </style>

</head>

<body>

<!-- ================= LOGO ================= -->

<div class="logo">

    <h2>

        TRACE
        <span>

            SYSTEM

        </span>

    </h2>

</div>

<!-- ================= LOGIN CARD ================= -->

<div class="login-container">

    <h1>

        Login

    </h1>

    <p class="sub-title">

        Login to continue

    </p>

    <!-- ================= FORM ================= -->

    <form action="/login"
          method="post">

        <!-- USERNAME -->

        <div class="input-group">

            <input type="text"
                   name="username"
                   placeholder="Username"
                   required>

        </div>

        <!-- PASSWORD -->

        <div class="input-group">

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

        </div>

        <!-- BUTTON -->

        <button class="login-btn">

            Login

        </button>

        <!-- REMEMBER -->

        <div class="remember-box">

            <input type="checkbox">

            <span>

                Remember me

            </span>

        </div>

    </form>

    <!-- SIGNUP LINK -->

    <p class="signup-link">

        Don't have an account?

        <a href="/signup">

            Sign up

        </a>

    </p>

</div>

</body>
</html>
